stages:
  - test
  - build
  - docker

test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn install:install-file -Dfile=libs/task-core-0.3.0.jar -DgroupId=sn.isi.l3gl.core -DartifactId=task-core -Dversion=0.3.0 -Dpackaging=jar
    - mvn compile -DskipTests
  only:
    - develop

build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn install:install-file -Dfile=libs/task-core-0.3.0.jar -DgroupId=sn.isi.l3gl.core -DartifactId=task-core -Dversion=0.3.0 -Dpackaging=jar
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
  only:
    - develop

docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
    - docker build -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:latest
  only:
    - develop